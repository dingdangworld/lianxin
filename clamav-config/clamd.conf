# ==============================
# ClamAV daemon configuration
# ==============================

# Path to virus database
DatabaseDirectory /var/lib/clamav

# Listen on all interfaces (Docker container)
# You can also use TCP socket instead of Unix socket
TCPSocket 3310
TCPAddr 0.0.0.0

# Enable the daemon
Foreground false
Debug false
LogSyslog true
LogFile /var/log/clamav/clamd.log
LogTime true
LogVerbose false

# Max file size to scan (e.g., 100MB)
MaxFileSize 100M

# Max total size of files to scan in archives
MaxScanSize 100M

# Max recursion depth for archives
MaxRecursion 16

# Max number of files in an archive
MaxFiles 10000

# Max size of data streams
StreamMaxLength 500M

# Only scan specific file types (optional)
# Example: Scan all
ScanPE yes
ScanOLE2 yes
ScanPDF yes
ScanSWF yes
ScanHTML yes
ScanMail yes

# Temporary directory inside container
TemporaryDirectory /tmp

# Reload virus database automatically
Reload yes
